<!DOCTYPE html>
<html lang="en">
<head>
<title>Student Registration Form</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">
<h2 class="text-center text-primary mb-4">Student Registration Form</h2>

<div class="row justify-content-center">
<div class="col-md-8">

<form onsubmit="showAlert(); return false;">

<div class="mb-3">
<label class="form-label">Student Name</label>
<input type="text" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Roll Number</label>
<input type="text" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Email</label>
<input type="email" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Gender</label><br>
<div class="form-check form-check-inline">
<input class="form-check-input" type="radio" name="gender">
<label class="form-check-label">Male</label>
</div>
<div class="form-check form-check-inline">
<input class="form-check-input" type="radio" name="gender">
<label class="form-check-label">Female</label>
</div>
</div>

<div class="mb-3">
<label class="form-label">Department</label>
<select class="form-select">
<option selected>Select Department</option>
<option>CSE</option>
<option>ECE</option>
<option>EEE</option>
<option>IT</option>
</select>
</div>

<div class="mb-3">
<label class="form-label">Subjects</label><br>
<div class="form-check">
<input class="form-check-input" type="checkbox">
<label class="form-check-label">Java</label>
</div>
<div class="form-check">
<input class="form-check-input" type="checkbox">
<label class="form-check-label">DBMS</label>
</div>
<div class="form-check">
<input class="form-check-input" type="checkbox">
<label class="form-check-label">Web Technology</label>
</div>
</div>

<div class="mb-3">
<label class="form-label">Upload Photo</label>
<input type="file" class="form-control">
</div>

<button type="submit" class="btn btn-success">Submit</button>
<button type="reset" class="btn btn-danger">Reset</button>

</form>

<div id="msg" class="alert alert-success mt-3 d-none">
Registration Successful
</div>

</div>
</div>

</div>

<script>
function showAlert(){
document.getElementById("msg").classList.remove("d-none");
}
</script>

</body>
</html>
