<!DOCTYPE html>

<html>
<head>
<title>Power Function</title>
</head>

<body>

<h2>Power Calculation</h2>

<script>

function power(base, exponent = 2)
{
    let result = Math.pow(base, exponent);

    document.write("Result = " + result);
}

power(5);

</script>

</body>
</html>
